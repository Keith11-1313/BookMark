<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BookMark — A curated, open-source directory of developer bookmarks, notes, code snippets, and prompts.">
  <meta name="theme-color" content="#1e1f22">
  <title>BookMark — Open Source Developer Directory</title>
  <link rel="icon" type="image/png" href="assets/icons/logo.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <!-- Styles -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/command-palette.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/links.css">
  <link rel="stylesheet" href="css/notes.css">
  <link rel="stylesheet" href="css/snippets.css">
  <link rel="stylesheet" href="css/prompts.css">

  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>
<body>

<!-- ── App Shell ───────────────────────────────────────────── -->
<div id="app" style="display:flex">
  <!-- Sidebar -->
  <aside class="app-sidebar" id="sidebar" role="navigation" aria-label="Main navigation"></aside>

  <!-- Main -->
  <main class="app-main">
    <!-- Page content -->
    <div class="page-content" id="page-content"></div>
  </main>

  <!-- Bottom nav (mobile) -->
  <nav id="bottom-nav" aria-label="Mobile navigation"></nav>
</div>

<!-- Toast container -->
<div id="toast-container" role="status" aria-live="polite"></div>

<!-- Command palette -->
<div id="command-palette-backdrop" role="dialog" aria-label="Command palette" aria-modal="true">
  <div class="command-palette">
    <div class="palette-search">
      <span class="palette-search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input class="palette-input" id="palette-input" type="text" placeholder="Search everything…" autocomplete="off" spellcheck="false">
      <span class="palette-esc">Esc</span>
    </div>
    <div class="palette-results" id="palette-results"></div>
    <div class="palette-hint">
      <div class="palette-hint-keys">
        <span class="palette-hint-key"><kbd>↑↓</kbd> Navigate</span>
        <span class="palette-hint-key"><kbd>Enter</kbd> Open</span>
        <span class="palette-hint-key"><kbd>Esc</kbd> Close</span>
      </div>
      <span>Ctrl K to open</span>
    </div>
  </div>
</div>

<!-- highlight.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

<!-- App scripts -->
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/command-palette.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/links.js"></script>
<script src="js/notes.js"></script>
<script src="js/snippets.js"></script>
<script src="js/prompts.js"></script>

</body>
</html>
